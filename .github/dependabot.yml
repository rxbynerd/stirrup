version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: UTC

  - package-ecosystem: gomod
    directory: /harness
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: UTC
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /types
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: UTC
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /eval
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: UTC
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: UTC
