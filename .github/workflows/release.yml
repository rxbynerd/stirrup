name: Release

# Triggered by pushing a v*.*.* tag, or manually re-runnable against an
# existing tag via workflow_dispatch (useful when a transient failure
# leaves the release incomplete and re-tagging would be heavy-handed).
#
# Pipeline (DAG via `needs:` — fan-out after verify):
#   validate-tag        → resolves and validates the input/ref tag once
#   verify              → reuses _verify.yml — the tagged SHA must pass tests
#   build-binaries      → matrix of GOOS/GOARCH cells, archives + SHA-256  ┐ parallel
#   sbom                → SPDX + CycloneDX from anchore/sbom-action         │ after
#   changelog           → git log since the previous tag                    │ verify
#   publish-container   → multi-arch image pushed to GHCR + GAR             ┘
#                         + image SBOM uploaded to Artifact Analysis
#   vulnerability-gate  → Phase 3: queries Artifact Analysis for vulns on
#                         the pushed digest, emits a summary, and files a
#                         tracking issue on CRITICAL+fixable findings.
#                         Currently WARN-only (not in `release.needs`);
#                         see docs/container-publishing.md for promotion
#                         path.
#   release             → aggregates SHA256SUMS and creates the GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (must match v*.*.*)'
        required: true
        type: string

# Default to read-only at the workflow level so a compromised action in the
# build/sbom/changelog matrix cannot push commits or create releases. Only
# the `release` job re-grants `contents: write` for the actual publish step.
permissions:
  contents: read

jobs:
  # validate-tag is the single source of truth for the release tag. Every
  # downstream job consumes its `tag` output instead of re-deriving and
  # re-validating from `inputs.tag` / `github.ref_name`. Centralising the
  # validation guard here means a workflow_dispatch with a garbage tag
  # ("notasemver") fails fast in this job — no SBOMs are generated, no
  # release is created, and the validation regex lives in exactly one place.
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve and validate tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "tag '$TAG' does not match v*.*.* (with optional prerelease suffix)" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify
    needs: validate-tag
    uses: ./.github/workflows/_verify.yml
    with:
      ref: ${{ needs.validate-tag.outputs.tag }}

  build-binaries:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    needs: [validate-tag, verify]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: linux, arch: amd64}
          - {os: linux, arch: arm64}
          - {os: darwin, arch: amd64}
          - {os: darwin, arch: arm64}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-tag.outputs.tag }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: |
            harness/go.mod
            types/go.mod
            eval/go.mod

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
          TAG: ${{ needs.validate-tag.outputs.tag }}
          SHORT_SHA: ${{ steps.sha.outputs.short }}
        run: |
          set -euo pipefail
          ext=""

          mkdir -p dist
          STIRRUP_OUT="dist/stirrup-${TAG}-${GOOS}-${GOARCH}${ext}"
          EVAL_OUT="dist/stirrup-eval-${TAG}-${GOOS}-${GOARCH}${ext}"

          # Build from repo root so go.work resolves the cross-module
          # imports (eval imports types/version, etc.).
          go build -trimpath \
            -ldflags="-s -w -X github.com/rxbynerd/stirrup/types/version.version=${TAG} -X github.com/rxbynerd/stirrup/types/version.commit=${SHORT_SHA}" \
            -o "${STIRRUP_OUT}" ./harness/cmd/stirrup
          go build -trimpath \
            -ldflags="-s -w -X github.com/rxbynerd/stirrup/types/version.version=${TAG} -X github.com/rxbynerd/stirrup/types/version.commit=${SHORT_SHA}" \
            -o "${EVAL_OUT}" ./eval/cmd/eval

      - name: Stage archive contents
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          TAG: ${{ needs.validate-tag.outputs.tag }}
        run: |
          set -euo pipefail
          ext=""

          STAGE="staging"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp "dist/stirrup-${TAG}-${GOOS}-${GOARCH}${ext}"      "$STAGE/stirrup${ext}"
          cp "dist/stirrup-eval-${TAG}-${GOOS}-${GOARCH}${ext}" "$STAGE/stirrup-eval${ext}"
          if [ -f LICENSE ]; then cp LICENSE "$STAGE/"; fi
          if [ -f README.md ]; then cp README.md "$STAGE/"; fi

      - name: Archive (tar.gz)
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          TAG: ${{ needs.validate-tag.outputs.tag }}
        run: |
          set -euo pipefail
          ARCHIVE="stirrup-${TAG}-${GOOS}-${GOARCH}.tar.gz"
          # -C into staging so the archive does not embed the staging dir.
          tar -czf "$ARCHIVE" -C staging .
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            stirrup-*.tar.gz
            stirrup-*.zip
            stirrup-*.sha256
          if-no-files-found: error
          retention-days: 7

  sbom:
    name: SBOM
    needs: [validate-tag, verify]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-tag.outputs.tag }}

      # SHA-pinned to v0.24.0. SHA verified via the GitHub API on
      # 2026-05-02 (`gh api repos/anchore/sbom-action/git/refs/tags/v0.24.0`,
      # which also matches the v0 floating tag's current target). Pinning
      # to an immutable commit defends against an upstream tag being
      # silently retargeted to attacker-controlled code.
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: stirrup-${{ needs.validate-tag.outputs.tag }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: stirrup-${{ needs.validate-tag.outputs.tag }}.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Compute SBOM checksums
        run: |
          set -euo pipefail
          for f in stirrup-*.spdx.json stirrup-*.cdx.json; do
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            stirrup-*.spdx.json
            stirrup-*.cdx.json
            stirrup-*.sha256
          if-no-files-found: error
          retention-days: 7

  changelog:
    name: Changelog
    needs: [validate-tag, verify]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # Full history is required for git describe / git log range.
          fetch-depth: 0

      - name: Generate CHANGELOG.md
        env:
          TAG: ${{ needs.validate-tag.outputs.tag }}
        run: |
          set -euo pipefail
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            RANGE="${PREV}..${TAG}"
            HEADER="## Changes since ${PREV}"
          else
            RANGE="${TAG}"
            HEADER="## Changes"
          fi
          {
            echo "$HEADER"
            echo
            # Cap at 100 lines to keep first-tag changelogs readable.
            git log --pretty=format:'- %s (%h)' --no-merges "$RANGE" | head -n 100
            echo
          } > CHANGELOG.md
          cat CHANGELOG.md

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v7
        with:
          name: changelog
          path: CHANGELOG.md
          if-no-files-found: error
          retention-days: 7

  publish-container:
    name: Publish Container
    needs: [validate-tag, verify]
    runs-on: ubuntu-latest
    # Tag-triggered workflows already do not run on forks by default, but
    # mirror the belt-and-braces guard from ci.yml::publish-container so
    # a future change to the trigger condition cannot accidentally
    # surface silent WIF auth failures on someone else's fork.
    #
    # `github.event_name` is intentionally NOT part of this guard: the
    # job must fire on both `push` (tag push from main) and
    # `workflow_dispatch` (operator re-run against an existing tag when
    # a transient GAR/GHCR failure left the release incomplete). Adding
    # an event_name check would silently break the dispatch recovery
    # path. The enforcement layers that DO matter are the repository
    # guard above and the WIF provider's attribute-condition (see
    # docs/container-publishing.md), which pins both
    # `assertion.repository` and the ref to `refs/heads/main` /
    # `refs/tags/v*`. Token issuance is locked at the GCP credential
    # layer, not by this YAML.
    if: github.repository == 'rxbynerd/stirrup'
    # Workflow-level default is contents: read; this job needs id-token
    # for the WIF JWT exchange and packages: write for the GHCR push.
    permissions:
      contents: read
      id-token: write
      packages: write
    # The digest of the pushed multi-arch manifest is exposed as a
    # job-level output so downstream jobs (vulnerability-gate) can
    # construct the digest-form image URI. Container Analysis APIs
    # (`gcloud artifacts docker images list --show-occurrences`,
    # `gcloud artifacts sbom load --uri`) require digest form because
    # vulnerability and SBOM occurrences must bind to a specific
    # manifest — a tag can move, a digest cannot. The within-job
    # `steps.docker-push.outputs.digest` consumer in this job
    # (the `sbom load` calls below) is unchanged; the output is purely
    # additive for cross-job consumption.
    outputs:
      digest: ${{ steps.docker-push.outputs.digest }}
    env:
      TAG: ${{ needs.validate-tag.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-tag.outputs.tag }}

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      # SHA-pinned to v3.7.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/setup-qemu-action/git/refs/tags/v3.7.0`,
      # which also matches the v3 floating tag's current target).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      # SHA-pinned to v4.0.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/setup-buildx-action/git/refs/tags/v4.0.0`,
      # which also matches the v4 floating tag's current target). Pinned
      # for the same reason as gcp-auth: this action runs inside the
      # job that holds a live GAR access token; a retargeted floating
      # tag could exfiltrate it.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # SHA-pinned to v4.1.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/login-action/git/refs/tags/v4.1.0`,
      # which also matches the v4 floating tag's current target). This
      # action receives the GHCR/GAR credentials as `password:` —
      # downstream consumer of the token gcp-auth mints; pinning to an
      # immutable commit is non-negotiable here too.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # SHA-pinned to v3.0.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/google-github-actions/auth/git/refs/tags/v3.0.0`,
      # which also matches the v3 floating tag's current target). This
      # action mints a Google access token from the GHA OIDC JWT and is
      # the trust hinge for GAR push — pinning to an immutable commit is
      # non-negotiable.
      #
      # `service_account` + `token_format: access_token` instructs the
      # action to exchange the federated GHA OIDC JWT for a short-lived
      # OAuth2 access token via service-account impersonation. The SA
      # `vars.GAR_PUBLISHER_SA` holds the GAR-push role bindings; the
      # GitHub principalSet only holds `roles/iam.workloadIdentityUser`
      # on the SA (the impersonation grant). This is the canonical
      # google-github-actions/auth pattern — see
      # `docs/container-publishing.md` for the migration rationale
      # (issue #167).
      - name: Authenticate to Google Cloud (WIF + SA impersonation)
        id: gcp-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GAR_PUBLISHER_SA }}
          token_format: access_token

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ vars.GAR_LOCATION }}-docker.pkg.dev
          # GAR demands the literal string "oauth2accesstoken" as the
          # username when the password is a short-lived access token.
          # Substituting a service-account email here fails opaquely —
          # do not "fix" this to something more meaningful.
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      # SHA-pinned to v6.0.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/metadata-action/git/refs/tags/v6.0.0`,
      # which also matches the v6 floating tag's current target). Pinned
      # for the same reason as login-action: runs inside the credentialled
      # publish job and constructs the tag list that build-push-action
      # consumes — a retargeted tag could redirect pushes.
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/rxbynerd/stirrup
            ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ vars.GAR_IMAGE }}
          # Semver tagging at release time:
          #   - {{version}}        — full vX.Y.Z (and prereleases like vX.Y.Z-rc1)
          #   - {{major}}.{{minor}} — sliding vX.Y pointer for non-prerelease tags
          #   - latest             — only on non-prerelease tags (hyphen-free)
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(needs.validate-tag.outputs.tag, '-') }}

      # SHA-pinned to v7.1.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/build-push-action/git/refs/tags/v7.1.0`,
      # which also matches the v7 floating tag's current target). This
      # action performs the actual push using the live GHCR + GAR
      # credentials; pinning to an immutable commit is non-negotiable
      # here for the same reason as gcp-auth and login-action.
      #
      # `id: docker-push` exposes the pushed multi-arch manifest digest
      # to downstream steps as `steps.docker-push.outputs.digest`. The
      # Phase 2 `gcloud artifacts sbom load --uri` calls require the
      # digest form of the image URI (tag form is rejected); the
      # digest is the only stable handle that pins an SBOM to the
      # exact manifest that was pushed.
      #
      # `sbom: true` instructs buildx to attach an SBOM as an OCI
      # in-toto attestation alongside the image. This is NOT a
      # substitute for the `gcloud artifacts sbom load` calls below —
      # the two serve different consumers:
      #
      #   * OCI attestation (sbom: true) — read by cosign/syft
      #     directly off the registry. Useful for ad-hoc image
      #     inspection and downstream tools that follow the
      #     SLSA / in-toto attestation chain.
      #   * Container Analysis occurrence (`sbom load`) — queryable
      #     via `gcloud artifacts sbom list` and consumed by Artifact
      #     Analysis's vulnerability scanner. The format the GCP
      #     console and Phase 3 vulnerability gate will read.
      #
      # Both ship; neither is redundant.
      - name: Build and push container image
        id: docker-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # sbom: true is intentionally release-only;
          # ci.yml::publish-container deliberately omits this to avoid
          # attaching OCI SBOM attestations to the transient :main /
          # :sha-* images it pushes on every main-branch commit (those
          # accumulate as registry noise). Future maintainers: do not
          # "fix" this asymmetry by adding sbom: true to ci.yml without
          # re-reading this comment and the matching note in
          # docs/container-publishing.md.
          sbom: true
          build-args: |
            VERSION=${{ env.TAG }}
            COMMIT=${{ steps.sha.outputs.short }}

      # SHA-pinned to v3.0.1. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/google-github-actions/setup-gcloud/git/refs/tags/v3.0.1`,
      # which also matches the v3 floating tag's current target).
      # google-github-actions/auth only writes credentials; this action
      # installs the `gcloud` CLI on PATH so the `sbom load` steps
      # below can invoke it. Installed AFTER the push so a failed push
      # short-circuits before we pay the install cost on the common
      # path. The CLI inherits the access_token minted by the earlier
      # gcp-auth step automatically — no separate `gcloud auth`
      # invocation is needed.
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        # `project_id:` here is preferred over passing `--project` on
        # every individual `gcloud` call: it makes the active project
        # self-documenting and breaks the implicit dependency on
        # CLOUDSDK_CORE_PROJECT being propagated from the gcp-auth
        # step's `project_id:` (line ~343). If a future edit to
        # gcp-auth removes that field for any reason, the
        # `gcloud artifacts sbom load` calls below would otherwise
        # silently target whatever project gcloud infers.
        #
        # `version:` floor is 502.0.0 (released 2024-11-19) — well
        # after `gcloud artifacts sbom load` stabilised in 442.0.0
        # (2023-08), early enough to be on every modern runner image
        # `setup-gcloud` will install. The `>=` constraint allows
        # forward-compatible patch upgrades while preventing a
        # rollback to a version that lacks the subcommand.
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          version: '>= 502.0.0'

      # SHA-pinned to v0.24.0. Same SHA as the source-tree SBOM job
      # above; verified via the GitHub API on 2026-05-02 (`gh api
      # repos/anchore/sbom-action/git/refs/tags/v0.24.0`). Pinning to
      # an immutable commit defends against an upstream tag being
      # silently retargeted to attacker-controlled code.
      #
      # Unlike the source-tree SBOM (which uses `path: .` and
      # describes the Go module graph), the image SBOM uses `image:`
      # with the digest form of the pushed manifest. anchore/sbom-action
      # shells out to syft against the pushed image, capturing the
      # distroless base layers and everything else actually present in
      # the deployed container. The two SBOMs are complementary, not
      # alternatives — Artifact Analysis vulnerability mapping needs
      # the image SBOM specifically because vulnerabilities live in
      # what got shipped, not in the source graph.
      #
      # upload-artifact / upload-release-assets are false: image SBOMs
      # go ONLY to Artifact Analysis. The source-tree SBOMs in the
      # release-asset bundle already cover the GitHub Release audience.
      # github-token: "" suppresses the implicit GITHUB_TOKEN this job
      # holds (with `packages: write` for the GHCR push above). The
      # action does not need GHCR-push authority for our usage —
      # `upload-artifact: false` and `upload-release-assets: false`
      # already disable its token-gated sub-steps. Capability hygiene:
      # do not pass write-scoped tokens into a third-party compiled
      # bundle when none of its code paths require them. The image
      # itself is fetched via the Docker daemon credential store
      # (already logged in via docker/login-action above), not via
      # this token.
      - name: Generate image SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ vars.GAR_IMAGE }}@${{ steps.docker-push.outputs.digest }}
          format: spdx-json
          output-file: stirrup-${{ needs.validate-tag.outputs.tag }}.image.spdx.json
          upload-artifact: false
          upload-release-assets: false
          github-token: ""

      - name: Generate image CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ vars.GAR_IMAGE }}@${{ steps.docker-push.outputs.digest }}
          format: cyclonedx-json
          output-file: stirrup-${{ needs.validate-tag.outputs.tag }}.image.cdx.json
          upload-artifact: false
          upload-release-assets: false
          github-token: ""

      # `gcloud artifacts sbom load --uri` REQUIRES the digest form of
      # the image URI (`@sha256:...`). Tag-form URIs are rejected by
      # the gcloud reference because an SBOM must bind to a specific
      # manifest, and a tag can move. The digest comes from the
      # earlier `id: docker-push` build-push step's output.
      #
      # These commands run as the impersonated service account from
      # the `id: gcp-auth` step earlier — google-github-actions/auth
      # exports ADC into the runner environment, and setup-gcloud
      # honours it transparently. No explicit `gcloud auth activate`
      # is needed. The four IAM roles `sbom load` requires
      # (containeranalysis.notes.editor / .occurrences.editor /
      # .notes.attacher / storage.objectAdmin) are bound to
      # vars.GAR_PUBLISHER_SA by the Phase 1 bootstrap documented in
      # docs/container-publishing.md.
      - name: Upload image SPDX SBOM to Artifact Analysis
        env:
          IMAGE_URI: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ vars.GAR_IMAGE }}@${{ steps.docker-push.outputs.digest }}
          SBOM_FILE: stirrup-${{ needs.validate-tag.outputs.tag }}.image.spdx.json
        run: |
          set -euo pipefail
          gcloud artifacts sbom load \
            --source "${SBOM_FILE}" \
            --uri "${IMAGE_URI}"

      - name: Upload image CycloneDX SBOM to Artifact Analysis
        env:
          IMAGE_URI: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ vars.GAR_IMAGE }}@${{ steps.docker-push.outputs.digest }}
          SBOM_FILE: stirrup-${{ needs.validate-tag.outputs.tag }}.image.cdx.json
        run: |
          set -euo pipefail
          gcloud artifacts sbom load \
            --source "${SBOM_FILE}" \
            --uri "${IMAGE_URI}"

  # Phase 3 of issue #159: query Artifact Analysis for vulnerabilities
  # on the just-pushed image and emit a summary. CURRENT MODE IS WARN
  # — the gate never fails the workflow, regardless of how many
  # vulnerabilities are found. A critical+fixable finding files a
  # tracking issue and the release proceeds. This is a deliberate
  # calibration window: we want to observe scan timing and false
  # positives against real release images before promoting to a
  # blocking gate. Promotion to block is a separate small PR.
  #
  # The job is intentionally NOT in `release.needs` so the warn
  # posture is structural, not just behavioural. If the gate is
  # promoted to block later, the only edits needed are (a) flip the
  # final summary step to `exit 1` on critical+fixable, and (b) add
  # `vulnerability-gate` to `release.needs`.
  vulnerability-gate:
    name: Vulnerability gate (warn mode)
    needs: [validate-tag, publish-container]
    runs-on: ubuntu-latest
    # Same repository guard as publish-container: forks neither have
    # the vars.* nor can mint a WIF token against this repo's pool, so
    # skip rather than fail confusingly.
    if: github.repository == 'rxbynerd/stirrup'
    # Least-privilege permission set:
    #   * contents: read    — checkout is not strictly required here,
    #                          but keeping the workflow-level default
    #                          explicit avoids surprising future edits.
    #   * id-token: write   — re-required because GHA OIDC tokens are
    #                          per-job; publish-container's token is
    #                          not reusable across job boundaries.
    #   * issues: write     — `gh issue create` requires it; this is
    #                          the ONLY new capability Phase 3 holds.
    # `packages: write` is deliberately omitted — the gate never
    # pushes anything to GHCR or anywhere else.
    permissions:
      contents: read
      id-token: write
      issues: write
    env:
      TAG: ${{ needs.validate-tag.outputs.tag }}
      IMAGE_URI: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ vars.GAR_IMAGE }}@${{ needs.publish-container.outputs.digest }}
    steps:
      # Re-auth: per-job OIDC tokens mean publish-container's access
      # token is not visible here. SHA-pinned to the same v3.0.0 as
      # publish-container; see the matching comment block above for
      # the rationale on immutable pinning.
      - name: Authenticate to Google Cloud (WIF + SA impersonation)
        id: gcp-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GAR_PUBLISHER_SA }}
          token_format: access_token

      # SHA-pinned to v3.0.1, same as publish-container. The
      # impersonated SA `vars.GAR_PUBLISHER_SA` already holds
      # `containeranalysis.occurrences.editor` (granted during the
      # Phase 1 bootstrap for `sbom load`), which transitively grants
      # the `occurrences.get` / `occurrences.list` reads the gate
      # needs — no new IAM bindings are required.
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          version: '>= 502.0.0'

      # Container Analysis emits a DISCOVERY occurrence per image
      # describing the scan lifecycle (`PENDING` → `SCANNING` →
      # `FINISHED_SUCCESS` / `FINISHED_FAILED`). Querying vulnerability
      # occurrences before discovery reaches `FINISHED_SUCCESS` would
      # return a half-populated set and create a noisy false-clean
      # result. Poll until the discovery analysis is finished or the
      # 10-minute deadline elapses.
      #
      # Timeout policy is WARN, not FAIL: a Google-side outage in the
      # Container Analysis scanner must not wedge releases. The
      # release-publishing job has already pushed the image and loaded
      # SBOMs; failing the gate on scanner latency would be operator-
      # hostile and would defeat the calibration window's purpose.
      # The tradeoff is explicit: false-negative vulnerability
      # discovery early on is acceptable; release stoppage on
      # transient infrastructure issues is not.
      #
      # `set +e` is used around each `gcloud` invocation because a
      # transient non-zero exit ("not yet propagated", "no occurrences
      # of that kind", etc.) is semantically "keep polling," not
      # "abort." The outer `set -euo pipefail` still applies to the
      # rest of the script.
      - name: Poll for discovery occurrence completion
        id: discovery
        run: |
          set -euo pipefail
          DEADLINE=$(( $(date +%s) + 600 ))
          INTERVAL=15
          STATE=""
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            set +e
            # `--limit=1` caps the record count server-side so we can
            # avoid piping to `head` — a pipeline would make `RC=$?`
            # reflect `head`'s exit status, not `gcloud`'s, masking
            # auth/IAM failures as benign empty results (see #170
            # remediation MF-1).
            STATE=$(gcloud artifacts docker images list \
              "${IMAGE_URI%@*}" \
              --show-occurrences \
              --occurrence-filter='kind="DISCOVERY"' \
              --filter="uri=\"${IMAGE_URI}\"" \
              --limit=1 \
              --format='value(DISCOVERY.discovery.analysisStatus)' 2>/dev/null)
            RC=$?
            set -e
            if [ "$RC" -eq 0 ] && [ "$STATE" = "FINISHED_SUCCESS" ]; then
              echo "discovery finished: $STATE"
              echo "state=$STATE" >> "$GITHUB_OUTPUT"
              echo "timed_out=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$RC" -eq 0 ] && [ "$STATE" = "FINISHED_FAILED" ]; then
              echo "discovery finished with FINISHED_FAILED — proceeding to query anyway"
              echo "state=$STATE" >> "$GITHUB_OUTPUT"
              echo "timed_out=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "discovery state: ${STATE:-<empty>} (rc=$RC) — sleeping ${INTERVAL}s"
            sleep "$INTERVAL"
          done
          # Timeout — warn-and-continue. Subsequent steps still run.
          echo "::warning::Container Analysis discovery did not finish within 10 minutes for ${IMAGE_URI}. Proceeding with whatever occurrences are available."
          {
            echo "## Vulnerability gate"
            echo
            echo "**Warning:** Container Analysis discovery did not reach \`FINISHED_SUCCESS\` within the 10-minute deadline for tag \`${TAG}\`."
            echo
            echo "The gate proceeded with whatever occurrences were available. This is a known-unknown tolerated by the warn calibration mode — scanner latency must not wedge releases."
            echo
          } >> "$GITHUB_STEP_SUMMARY"
          echo "state=${STATE:-UNKNOWN}" >> "$GITHUB_OUTPUT"
          echo "timed_out=true" >> "$GITHUB_OUTPUT"

      # Fetch all vulnerability occurrences for the image, compute
      # severity-bucket counts (total + fixable), persist the raw
      # JSON for downstream steps, and emit step outputs.
      #
      # A zero-occurrence response from `gcloud` produces empty
      # stdout; the redirect creates an empty file. The `! -s` check
      # below writes `[]` so that the subsequent `jq` invocation
      # always receives valid JSON rather than an empty file. The
      # earlier `if [ "$RC" -ne 0 ]` branch handles the case where
      # gcloud itself exits non-zero on a clean image (observed
      # historically with some occurrence kinds) by writing `[]`
      # before the size check runs.
      - name: Query vulnerability occurrences
        id: vulnerabilities
        run: |
          set -euo pipefail
          set +e
          gcloud artifacts docker images list \
            "${IMAGE_URI%@*}" \
            --show-occurrences \
            --occurrence-filter='kind="VULNERABILITY"' \
            --filter="uri=\"${IMAGE_URI}\"" \
            --format=json > vulnerabilities.json 2>/tmp/vuln-stderr
          RC=$?
          set -e
          if [ "$RC" -ne 0 ]; then
            echo "gcloud returned rc=$RC; treating as empty occurrence set. stderr:"
            cat /tmp/vuln-stderr || true
            echo "[]" > vulnerabilities.json
          fi
          if [ ! -s vulnerabilities.json ]; then
            echo "[]" > vulnerabilities.json
          fi

          # `gcloud artifacts docker images list --show-occurrences`
          # returns one record per image with a nested
          # `package_vulnerability_summary.vulnerabilities` map keyed
          # by severity. Some installs return a flat `vulnerability`
          # array instead — handle both shapes defensively.
          #
          # SF-1: wrap the jq normalisation in an error guard. If the
          # raw JSON is malformed (partial gcloud response on a
          # transient error), bailing mid-step under `set -euo pipefail`
          # would skip the `$GITHUB_OUTPUT` writes — downstream `if:`
          # conditions that compare against `''` would then evaluate
          # `'' != '0'` as true and fire the issue-creation step with
          # an empty table. Emit a warning, fall back to an empty
          # normalised set, and surface `parse_error=true` so the
          # summary step can render "parse_error" instead of a
          # misleading zero table.
          PARSE_ERROR=false
          if ! jq '
            def normalise:
              if type == "array" then .
              elif type == "object" then [.]
              else []
              end;
            [
              (normalise[]
               | (.vulnerability // .package_vulnerability_summary.vulnerabilities // {})
               | if type == "object" then
                   to_entries | map(.value)
                   | flatten | map(select(type == "object"))
                 elif type == "array" then
                   .
                 else [] end
               | .[])
            ]
          ' vulnerabilities.json > vulnerabilities.normalised.json 2>/tmp/jq-stderr; then
            echo "::warning::jq normalisation failed; defaulting all counts to -1 (data absent, not zero)"
            cat /tmp/jq-stderr || true
            PARSE_ERROR=true
            echo "[]" > vulnerabilities.normalised.json
          fi

          count_by_sev() {
            local sev="$1"
            jq --arg sev "$sev" '[.[] | select((.severity // .vulnerability.severity // "") | ascii_upcase == $sev)] | length' vulnerabilities.normalised.json
          }
          count_fixable() {
            local sev="$1"
            jq --arg sev "$sev" '[.[] | select(((.severity // .vulnerability.severity // "") | ascii_upcase) == $sev) | select((.fixAvailable // .vulnerability.fixAvailable // false) == true)] | length' vulnerabilities.normalised.json
          }

          if [ "${PARSE_ERROR}" = "true" ]; then
            # `-1` is structurally distinguishable from "0 findings on a
            # clean image" downstream — the summary step renders
            # `parse_error` and the issue-creation `if:` will still match
            # `!= '0'`, but the body explicitly notes data is absent.
            CRITICAL=-1
            CRITICAL_FIXABLE=-1
            HIGH=-1
            HIGH_FIXABLE=-1
            MEDIUM=-1
            LOW=-1
          else
            CRITICAL=$(count_by_sev CRITICAL)
            CRITICAL_FIXABLE=$(count_fixable CRITICAL)
            HIGH=$(count_by_sev HIGH)
            HIGH_FIXABLE=$(count_fixable HIGH)
            MEDIUM=$(count_by_sev MEDIUM)
            LOW=$(count_by_sev LOW)
          fi

          {
            echo "critical_count=${CRITICAL}"
            echo "critical_fixable_count=${CRITICAL_FIXABLE}"
            echo "high_count=${HIGH}"
            echo "high_fixable_count=${HIGH_FIXABLE}"
            echo "medium_count=${MEDIUM}"
            echo "low_count=${LOW}"
            echo "parse_error=${PARSE_ERROR}"
          } >> "$GITHUB_OUTPUT"

          echo "critical=${CRITICAL} (fixable=${CRITICAL_FIXABLE}) high=${HIGH} (fixable=${HIGH_FIXABLE}) medium=${MEDIUM} low=${LOW} parse_error=${PARSE_ERROR}"

      # Markdown summary runs unconditionally so the calibration data
      # is visible in the Actions UI even when the gate has nothing to
      # block on. The reproducer link gives operators the exact
      # `gcloud` invocation to re-query locally.
      - name: Write summary
        if: always()
        env:
          CRITICAL: ${{ steps.vulnerabilities.outputs.critical_count }}
          CRITICAL_FIXABLE: ${{ steps.vulnerabilities.outputs.critical_fixable_count }}
          HIGH: ${{ steps.vulnerabilities.outputs.high_count }}
          HIGH_FIXABLE: ${{ steps.vulnerabilities.outputs.high_fixable_count }}
          MEDIUM: ${{ steps.vulnerabilities.outputs.medium_count }}
          LOW: ${{ steps.vulnerabilities.outputs.low_count }}
          PARSE_ERROR: ${{ steps.vulnerabilities.outputs.parse_error }}
        run: |
          set -euo pipefail
          # SF-1: when jq normalisation failed, counts were defaulted to
          # `-1` upstream so we can distinguish "data absent" from
          # "clean image with zero findings." Render `parse_error` in
          # the table cells rather than a misleading `-1`.
          if [ "${PARSE_ERROR:-false}" = "true" ]; then
            CRITICAL_CELL="parse_error"
            CRITICAL_FIXABLE_CELL="parse_error"
            HIGH_CELL="parse_error"
            HIGH_FIXABLE_CELL="parse_error"
            MEDIUM_CELL="parse_error"
            LOW_CELL="parse_error"
          else
            CRITICAL_CELL="${CRITICAL:-?}"
            CRITICAL_FIXABLE_CELL="${CRITICAL_FIXABLE:-?}"
            HIGH_CELL="${HIGH:-?}"
            HIGH_FIXABLE_CELL="${HIGH_FIXABLE:-?}"
            MEDIUM_CELL="${MEDIUM:-?}"
            LOW_CELL="${LOW:-?}"
          fi
          {
            echo "## Vulnerability gate — ${TAG}"
            echo
            echo "**Image:** \`${IMAGE_URI}\`"
            echo
            echo "**Mode:** warn (Phase 3 calibration; gate never blocks the release)"
            echo
            if [ "${PARSE_ERROR:-false}" = "true" ]; then
              echo "**WARNING:** jq normalisation failed — vulnerability data is **absent**, not clean. See the \`Query vulnerability occurrences\` step logs and the manual reproducer below."
              echo
            fi
            echo "| Severity | Total | Fixable |"
            echo "|---|---|---|"
            echo "| CRITICAL | ${CRITICAL_CELL} | ${CRITICAL_FIXABLE_CELL} |"
            echo "| HIGH | ${HIGH_CELL} | ${HIGH_FIXABLE_CELL} |"
            echo "| MEDIUM | ${MEDIUM_CELL} | n/a |"
            echo "| LOW | ${LOW_CELL} | n/a |"
            echo
            echo "Reproduce locally:"
            echo
            echo '```sh'
            echo "gcloud artifacts docker images list ${IMAGE_URI%@*} \\"
            echo "  --show-occurrences \\"
            echo "  --occurrence-filter='kind=\"VULNERABILITY\"' \\"
            echo "  --filter='uri=\"${IMAGE_URI}\"' \\"
            echo "  --format=json"
            echo '```'
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      # The STIRRUP_RELEASE_VULN_OVERRIDE repo variable lets an
      # operator bypass the issue-creation step for a specific tag —
      # intended for the case where the release is already cut, the
      # finding is known/triaged, and rolling back is high-cost. The
      # override does NOT skip the query or the summary above —
      # observability is preserved.
      #
      # Operator responsibility: every use of this override SHOULD be
      # accompanied by a separately-filed tracking issue documenting
      # why. The override is intentionally narrow (matches a single
      # tag string, no glob, no env-var fallback) so that forgetting
      # to clear it cannot silently bypass future releases.
      - name: Check vulnerability override
        id: override
        env:
          OVERRIDE_TAG: ${{ vars.STIRRUP_RELEASE_VULN_OVERRIDE }}
        run: |
          set -euo pipefail
          if [ -n "${OVERRIDE_TAG:-}" ] && [ "${OVERRIDE_TAG}" = "${TAG}" ]; then
            echo "active=true" >> "$GITHUB_OUTPUT"
            {
              echo "### Override active"
              echo
              echo "**WARNING:** Vulnerability gate bypassed via \`vars.STIRRUP_RELEASE_VULN_OVERRIDE\` for tag \`${TAG}\`."
              echo
              echo "The issue-creation step has been short-circuited. A durable override-audit issue is being filed automatically — the operator MUST add a rationale comment on it."
              echo
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Vulnerability gate override active for ${TAG}"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
          fi

      # SF-3: when the override fires, the `::warning::` annotation and
      # step summary block are both ephemeral (90-day GitHub retention).
      # `vars.STIRRUP_RELEASE_VULN_OVERRIDE` is settable by any repo
      # collaborator with write access and leaves no trace in git
      # history. Auto-file a minimal tracking issue so there is a
      # permanent record an operator can query after the run logs
      # expire. The body is intentionally minimal — the rationale
      # belongs in a comment from the operator who set the override.
      - name: File override-audit tracking issue
        if: steps.override.outputs.active == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="vuln gate override used: ${TAG}"
          BODY_FILE=$(mktemp)
          {
            echo "Override active for \`${TAG}\`. The vulnerability-gate's tracking-issue step was short-circuited via \`vars.STIRRUP_RELEASE_VULN_OVERRIDE\`."
            echo
            echo "The operator who set the override MUST document the rationale as a comment on this issue. Without that comment there is no durable record of why the gate was bypassed."
            echo
            echo "**Workflow run:** ${RUN_URL}"
          } > "${BODY_FILE}"

          if ! gh issue create \
            --title "${TITLE}" \
            --body-file "${BODY_FILE}" \
            --label security; then
            echo "::warning::override-audit issue create with label failed; retrying without label"
            if ! gh issue create \
              --title "${TITLE}" \
              --body-file "${BODY_FILE}"; then
              echo "::warning::override-audit issue create WITHOUT label also failed — no durable record filed for ${TAG} override. Manual triage required."
            fi
          fi

      # File a tracking issue when critical+fixable findings exist
      # AND the override is not active. Warn-mode threshold is
      # deliberately narrow (critical AND fixable) — anything wider
      # would generate noise during the calibration window. A high-
      # severity fixable finding still appears in the summary table.
      #
      # `--label` flags may fail if the labels do not exist in the
      # repo; tolerate that with `|| true` and let the operator add
      # them after the fact. Keeping this defensive avoids a
      # spurious gate failure on a clean-but-unlabelled repo.
      - name: File tracking issue for critical fixable vulnerabilities
        if: steps.override.outputs.active != 'true' && steps.vulnerabilities.outputs.critical_fixable_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CRITICAL_FIXABLE: ${{ steps.vulnerabilities.outputs.critical_fixable_count }}
          CRITICAL: ${{ steps.vulnerabilities.outputs.critical_count }}
          HIGH: ${{ steps.vulnerabilities.outputs.high_count }}
          HIGH_FIXABLE: ${{ steps.vulnerabilities.outputs.high_fixable_count }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          # Build the table of critical-fixable findings.
          TABLE=$(jq -r '
            def sev: (.severity // .vulnerability.severity // "");
            def fix: (.fixAvailable // .vulnerability.fixAvailable // false);
            def cve: (.shortDescription // .vulnerability.shortDescription // .name // "<unknown>");
            def pkg: (.packageIssue[0].affectedPackage // .vulnerability.packageIssue[0].affectedPackage // "<unknown>");
            def fixedver: (.packageIssue[0].fixedVersion.name // .vulnerability.packageIssue[0].fixedVersion.name // "<none>");
            [.[] | select((sev | ascii_upcase) == "CRITICAL") | select(fix == true) |
              "| " + cve + " | " + pkg + " | " + fixedver + " | CRITICAL | true |"
            ] | join("\n")
          ' vulnerabilities.normalised.json)

          BODY_FILE=$(mktemp)
          {
            echo "Container Analysis flagged ${CRITICAL_FIXABLE} critical fixable vulnerability(ies) in the image just published for tag \`${TAG}\`."
            echo
            echo "**Image:** \`${IMAGE_URI}\`"
            echo
            echo "**Calibration mode:** Phase 3 (issue #159) is currently in warn-and-file mode. The release was published anyway; this issue exists so the finding is not lost. Promotion to a blocking gate is a separate follow-up PR."
            echo
            echo "### Critical fixable findings"
            echo
            echo "| CVE | Package | Fixed version | Severity | Fix available |"
            echo "|---|---|---|---|---|"
            if [ -n "${TABLE}" ]; then
              echo "${TABLE}"
            else
              echo "| _(detail extraction failed — see workflow logs and \`gcloud\` reproducer)_ |  |  |  |  |"
            fi
            echo
            echo "### Severity summary"
            echo
            echo "| Severity | Total | Fixable |"
            echo "|---|---|---|"
            echo "| CRITICAL | ${CRITICAL} | ${CRITICAL_FIXABLE} |"
            echo "| HIGH | ${HIGH} | ${HIGH_FIXABLE} |"
            echo
            echo "### Suggested triage"
            echo
            echo "1. Review each finding above and confirm the fix version is non-breaking."
            echo "2. Patch the affected dependency (image base or Go module)."
            echo "3. Cut a new tag (\`vX.Y.(Z+1)\` or appropriate semver bump) and let the release pipeline re-run."
            echo
            echo "### Workflow run"
            echo
            echo "${RUN_URL}"
          } > "${BODY_FILE}"

          TITLE="vulnerability gate: ${CRITICAL_FIXABLE} critical fixable issue(s) in stirrup ${TAG}"

          # Best-effort labels: if either label does not exist in the
          # repo, gh exits non-zero and we fall back to a label-less
          # create. The issue still gets filed — labels are sugar.
          #
          # SF-2: do NOT swallow the label-less retry with `|| true`.
          # A genuine failure (network, auth, GitHub API 5xx) needs to
          # surface as a `::warning::` annotation so the step doesn't
          # look green when no issue was filed — that would defeat the
          # audit-trail purpose of the tracking issue. Warn-mode
          # invariant preserved: still exits 0 either way.
          if ! gh issue create \
            --title "${TITLE}" \
            --body-file "${BODY_FILE}" \
            --label security \
            --label vulnerability; then
            echo "::warning::issue create with labels failed; retrying without labels"
            if ! gh issue create \
              --title "${TITLE}" \
              --body-file "${BODY_FILE}"; then
              echo "::warning::issue create WITHOUT labels also failed — no tracking issue filed for ${TAG}. Manual triage required."
            fi
          fi

      # Final calibration log line: always exits 0. Once the warn
      # window is closed, the only change needed to promote this to
      # a blocking gate is to swap the echo for `exit 1` on the
      # `would block` branch and to add `vulnerability-gate` to
      # `release.needs`.
      - name: Gate result (calibration log)
        if: always()
        env:
          CRITICAL_FIXABLE: ${{ steps.vulnerabilities.outputs.critical_fixable_count }}
          OVERRIDE_ACTIVE: ${{ steps.override.outputs.active }}
        run: |
          set -euo pipefail
          if [ "${OVERRIDE_ACTIVE:-false}" = "true" ]; then
            echo "warn mode: override active for ${TAG}; would-be block decision skipped"
          elif [ "${CRITICAL_FIXABLE:-0}" != "0" ]; then
            echo "warn mode: would block with ${CRITICAL_FIXABLE} critical fixable"
          else
            echo "warn mode: would pass cleanly"
          fi

  release:
    name: Publish Release
    needs: [validate-tag, verify, build-binaries, sbom, changelog, publish-container]
    runs-on: ubuntu-latest
    # Only the publish step needs write access to releases. Granting it at
    # the job level (rather than the workflow level) keeps the blast radius
    # of any compromise in the matrix jobs minimal.
    permissions:
      contents: write
    env:
      TAG: ${{ needs.validate-tag.outputs.tag }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Aggregate release assets and SHA256SUMS
        run: |
          set -euo pipefail
          mkdir -p release
          # Flatten archives, SBOMs, and per-cell sums into release/.
          find artifacts -type f \( \
            -name 'stirrup-*.tar.gz' -o \
            -name 'stirrup-*.zip' -o \
            -name 'stirrup-*.spdx.json' -o \
            -name 'stirrup-*.cdx.json' \
          \) -exec cp -v {} release/ \;

          # Locate the changelog (artifact path is artifacts/changelog/CHANGELOG.md).
          cp artifacts/changelog/CHANGELOG.md CHANGELOG.md

          cd release
          # Recompute checksums against the flattened files so the final
          # SHA256SUMS references the bare filenames consumers will see.
          # Use -print0 / sort -z / xargs -0 to handle filenames with
          # whitespace or other shell-special characters safely. The
          # explicit `! -name SHA256SUMS` guard prevents the file we are
          # about to write from being included in its own checksum line.
          : > SHA256SUMS
          find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            | xargs -0 sha256sum >> SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS
          echo "--- verifying ---"
          sha256sum -c SHA256SUMS

      # TODO(#NN): cosign sign-blob each release/ asset + SHA256SUMS,
      # attach .sig files alongside the archives. Pre-wired so the
      # follow-up only needs to flip these on.
      # - uses: sigstore/cosign-installer@v3
      # - run: |
      #     cd release
      #     for f in *.tar.gz *.zip *.spdx.json *.cdx.json SHA256SUMS; do
      #       cosign sign-blob --yes --output-signature "${f}.sig" "$f"
      #     done

      # SHA-pinned to v3.0.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/softprops/action-gh-release/git/refs/tags/v3.0.0`,
      # which also matches the v3 floating tag's current target). This
      # action runs with the job-scoped `contents: write` token, making
      # it the highest-trust step in the workflow — pinning to an
      # immutable commit is non-negotiable here.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          body_path: CHANGELOG.md
          draft: false
          # Treat any tag with a hyphen (e.g. v1.2.3-rc1) as a prerelease.
          prerelease: ${{ contains(env.TAG, '-') }}
          fail_on_unmatched_files: true
