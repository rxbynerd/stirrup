name: CI

on:
  push:

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/_verify.yml

  eval-gate:
    name: Eval Gate
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: |
            harness/go.mod
            types/go.mod
            eval/go.mod

      - name: Compute version label
        id: ver
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "label=main" >> "$GITHUB_OUTPUT"
          else
            echo "label=dev" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          go build -trimpath \
            -ldflags="-X github.com/rxbynerd/stirrup/types/version.version=${{ steps.ver.outputs.label }} -X github.com/rxbynerd/stirrup/types/version.commit=${{ steps.ver.outputs.sha }}" \
            -o stirrup ./harness/cmd/stirrup
          go build -trimpath \
            -ldflags="-X github.com/rxbynerd/stirrup/types/version.version=${{ steps.ver.outputs.label }} -X github.com/rxbynerd/stirrup/types/version.commit=${{ steps.ver.outputs.sha }}" \
            -o stirrup-eval ./eval/cmd/eval

      - name: Check for eval suites
        id: check-suites
        shell: bash
        run: |
          shopt -s nullglob
          suites=(eval/suites/*.hcl)
          if [ ${#suites[@]} -gt 0 ]; then
            echo "has_suites=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_suites=false" >> "$GITHUB_OUTPUT"
            echo "No eval suites found — skipping eval gate"
          fi

      - name: Run eval suite
        if: steps.check-suites.outputs.has_suites == 'true'
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          shopt -s nullglob
          mkdir -p eval/results
          for suite in eval/suites/*.hcl; do
            name=$(basename "$suite")
            name="${name%.*}"
            # JUnit XML is an annotation/artifact only; the eval gate
            # is enforced by the `compare` step below.
            ./stirrup-eval run \
              --suite "$suite" \
              --harness ./stirrup \
              --output "eval/results/${name}" \
              --junit "eval/results/${name}/junit.xml"
          done

      - name: Compare against baseline
        if: steps.check-suites.outputs.has_suites == 'true'
        shell: bash
        run: |
          shopt -s nullglob
          for result_dir in eval/results/*/; do
            name=$(basename "$result_dir")
            result="${result_dir}result.json"
            baseline="eval/baselines/${name}.json"
            if [ -f "$baseline" ]; then
              ./stirrup-eval compare \
                --current "$result" \
                --baseline "$baseline"
            else
              echo "No baseline found at $baseline — skipping comparison"
            fi
          done

      - name: Upload eval results
        # Always upload whatever made it to disk so result.json survives
        # an unrelated failure (e.g. compare step regression exit, future
        # secondary-artifact steps). The eval-gate's pass/fail signal is
        # carried by the compare step's exit code, not artifact presence.
        if: always() && steps.check-suites.outputs.has_suites == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: eval-results
          path: eval/results/
          retention-days: 30

  publish-container:
    name: Publish Container
    runs-on: ubuntu-latest
    needs: verify
    # Belt-and-braces fork guard: the WIF provider's attribute condition
    # already pins assertion.repository == 'rxbynerd/stirrup', but adding
    # the repository check here means a future change to the trigger
    # condition (e.g. running on forked main branches) cannot accidentally
    # surface a silent WIF auth failure on someone else's fork.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'rxbynerd/stirrup'
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Compute short SHA
        id: ver
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # SHA-pinned to v3.7.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/setup-qemu-action/git/refs/tags/v3.7.0`,
      # which also matches the v3 floating tag's current target).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # SHA-pinned to v3.0.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/google-github-actions/auth/git/refs/tags/v3.0.0`,
      # which also matches the v3 floating tag's current target). This
      # action mints a Google access token from the GHA OIDC JWT and is
      # the trust hinge for GAR push — pinning to an immutable commit is
      # non-negotiable.
      - name: Authenticate to Google Cloud (Direct WIF)
        id: gcp-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          token_format: access_token

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.GAR_LOCATION }}-docker.pkg.dev
          # GAR demands the literal string "oauth2accesstoken" as the
          # username when the password is a short-lived access token.
          # Substituting a service-account email here fails opaquely —
          # do not "fix" this to something more meaningful.
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/rxbynerd/stirrup
            ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ vars.GAR_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=main
            COMMIT=${{ steps.ver.outputs.sha }}
