name: CI

on:
  push:

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/_verify.yml

  eval-gate:
    name: Eval Gate
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # id-token: write is required for Anthropic Workload Identity
    # Federation: actions/checkout's runner exposes
    # ACTIONS_ID_TOKEN_REQUEST_URL / ACTIONS_ID_TOKEN_REQUEST_TOKEN
    # only when this permission is granted. The harness then exchanges
    # the OIDC token for an Anthropic access token using the four
    # `--anthropic-*` flags forwarded below. No static API key is in
    # scope. See .github/workflows/smoke-anthropic.yml for the
    # established WIF pattern and #130 for the original rollout.
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: |
            harness/go.mod
            types/go.mod
            eval/go.mod

      - name: Compute version label
        id: ver
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "label=main" >> "$GITHUB_OUTPUT"
          else
            echo "label=dev" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          go build -trimpath \
            -ldflags="-X github.com/rxbynerd/stirrup/types/version.version=${{ steps.ver.outputs.label }} -X github.com/rxbynerd/stirrup/types/version.commit=${{ steps.ver.outputs.sha }}" \
            -o stirrup ./harness/cmd/stirrup
          go build -trimpath \
            -ldflags="-X github.com/rxbynerd/stirrup/types/version.version=${{ steps.ver.outputs.label }} -X github.com/rxbynerd/stirrup/types/version.commit=${{ steps.ver.outputs.sha }}" \
            -o stirrup-eval ./eval/cmd/eval

      - name: Check for eval suites
        id: check-suites
        shell: bash
        run: |
          shopt -s nullglob
          suites=(eval/suites/*.hcl)
          if [ ${#suites[@]} -gt 0 ]; then
            echo "has_suites=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_suites=false" >> "$GITHUB_OUTPUT"
            echo "No eval suites found — skipping eval gate"
          fi

      # Pre-flight credential guard. Without it, a misconfigured
      # workflow (no static key, WIF wiring accidentally removed)
      # would silently fail every harness invocation with an auth
      # error buried in per-task output, and the compare step would
      # report a 5/5 → 0/5 "regression" that is really an auth gap.
      # Mirrors the check-suites step's shape so an operator
      # reviewing the job log sees the same skip-with-warning
      # pattern for both prerequisites. The WIF posture today is
      # always-on (the run step forwards the four
      # --anthropic-* flags unconditionally), so this guard is
      # mainly defensive against a future regression that strips
      # the flags or drops `id-token: write`.
      - name: Check Anthropic credentials
        id: check-creds
        if: steps.check-suites.outputs.has_suites == 'true'
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Check whether a real credential source is available.
          # GitHub Actions sets ACTIONS_ID_TOKEN_REQUEST_URL only when
          # id-token: write is in scope and the OIDC subsystem is
          # operational. If neither a static key nor WIF is present,
          # skip the run steps and emit a warning so the missing
          # credential is visible in the job log rather than buried as
          # per-task auth errors.
          if [ -n "${ANTHROPIC_API_KEY:-}" ] || [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No Anthropic credentials configured (neither ANTHROPIC_API_KEY nor ACTIONS_ID_TOKEN_REQUEST_URL). Skipping live eval runs."
          fi

      - name: Run eval suite
        if: steps.check-suites.outputs.has_suites == 'true' && steps.check-creds.outputs.has_credentials == 'true'
        shell: bash
        env:
          # Forwarded for backwards compatibility: if a static key is
          # ever reintroduced (e.g. a fork that wants to opt out of
          # WIF), the harness already prefers an explicit
          # ANTHROPIC_API_KEY over the WIF flags. In the canonical
          # CI configuration this is empty and the harness uses WIF
          # exclusively.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          shopt -s nullglob
          mkdir -p eval/results
          for suite in eval/suites/*.hcl; do
            name=$(basename "$suite")
            name="${name%.*}"
            # JUnit XML is an annotation/artifact only; the eval gate
            # is enforced by the `compare` step below.
            #
            # The four --anthropic-* flags are non-secret per
            # Anthropic's WIF documentation (see
            # .github/workflows/smoke-anthropic.yml). The harness
            # exchanges the GitHub Actions OIDC token for an Anthropic
            # access token inside the subprocess; no static key is in
            # scope.
            #
            # --harness is absolute: the runner execs it with cmd.Dir set
            # to each task's temp workspace, so a relative path would be
            # resolved against that workspace and fail. The runner also
            # anchors relative paths to absolute defensively, but passing
            # an absolute path here keeps the intent obvious.
            ./stirrup-eval run \
              --suite "$suite" \
              --harness "$GITHUB_WORKSPACE/stirrup" \
              --output "eval/results/${name}" \
              --junit "eval/results/${name}/junit.xml" \
              --anthropic-federation-rule-id fdrl_01QJMFE86qFDdWzQXEekhYjY \
              --anthropic-organization-id 5848ccdc-495f-490b-9275-2caab9db344d \
              --anthropic-service-account-id svac_01Tf7i7VwZm6WRAFjNAawPw9 \
              --anthropic-from-github-actions
          done

      - name: Compare against baseline
        # Gated on has_credentials in addition to has_suites: without
        # credentials the Run eval suite step is skipped, so there is
        # no result.json to compare. Without this guard the loop body
        # would skip silently (nullglob), but the explicit gate makes
        # the dependency between the two steps readable in the job log.
        if: steps.check-suites.outputs.has_suites == 'true' && steps.check-creds.outputs.has_credentials == 'true'
        shell: bash
        run: |
          shopt -s nullglob
          for result_dir in eval/results/*/; do
            name=$(basename "$result_dir")
            result="${result_dir}result.json"
            baseline="eval/baselines/${name}.json"
            if [ -f "$baseline" ]; then
              ./stirrup-eval compare \
                --current "$result" \
                --baseline "$baseline"
            else
              echo "No baseline found at $baseline — skipping comparison"
            fi
          done

      - name: Upload eval results
        # Always upload whatever made it to disk so result.json survives
        # an unrelated failure (e.g. compare step regression exit, future
        # secondary-artifact steps). The eval-gate's pass/fail signal is
        # carried by the compare step's exit code, not artifact presence.
        # Gated on has_credentials so a credentials-skipped run does not
        # upload an empty artifact directory.
        if: always() && steps.check-suites.outputs.has_suites == 'true' && steps.check-creds.outputs.has_credentials == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: eval-results
          path: eval/results/
          retention-days: 30

  publish-container:
    name: Publish Container
    runs-on: ubuntu-latest
    needs: verify
    # Belt-and-braces fork guard mirroring the publish jobs elsewhere.
    # ci.yml's publish-container is GHCR-only; the GAR dual-publish
    # path lives in release.yml::publish-container. Dev images
    # (:latest, :main, :sha-<7>) are deliberately kept out of GAR
    # because containerscanning.googleapis.com (enabled project-wide
    # per docs/container-publishing.md) auto-scans on every GAR push
    # and bills per scan — sending one scan per main commit is the
    # line item that made the GCP bill exceed token spend. Releases
    # still dual-publish, and free continuous CVE re-evaluation
    # against loaded SBOMs continues for everything already in GAR.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'rxbynerd/stirrup'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      # Mirrors the eval-gate version-computation step. The `if:` guard
      # above currently restricts this job to refs/heads/main pushes, so
      # `label` will always be `main` today; computing it indirectly
      # keeps the build-args block honest if that condition is ever
      # relaxed (e.g. tag-triggered runs added) and prevents the
      # VERSION literal from drifting from the actual ref.
      - name: Compute version label
        id: ver
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "label=main" >> "$GITHUB_OUTPUT"
          else
            echo "label=dev" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # SHA-pinned to v3.7.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/setup-qemu-action/git/refs/tags/v3.7.0`,
      # which also matches the v3 floating tag's current target).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      # SHA-pinned to v4.0.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/setup-buildx-action/git/refs/tags/v4.0.0`,
      # which also matches the v4 floating tag's current target). Pinned
      # for the same reason as login-action: runs inside the
      # credentialled push job and a retargeted floating tag could
      # exfiltrate the GHCR token in env.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # SHA-pinned to v4.1.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/login-action/git/refs/tags/v4.1.0`,
      # which also matches the v4 floating tag's current target). This
      # action receives the GHCR credentials as `password:`; pinning
      # to an immutable commit is non-negotiable here.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # SHA-pinned to v6.0.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/metadata-action/git/refs/tags/v6.0.0`,
      # which also matches the v6 floating tag's current target). Pinned
      # for the same reason as login-action: runs inside the credentialled
      # publish job and constructs the tag list that build-push-action
      # consumes — a retargeted tag could redirect pushes.
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ghcr.io/rxbynerd/stirrup
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-

      # SHA-pinned to v7.1.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/build-push-action/git/refs/tags/v7.1.0`,
      # which also matches the v7 floating tag's current target). This
      # action performs the actual push using the live GHCR + GAR
      # credentials; pinning to an immutable commit is non-negotiable
      # here for the same reason as gcp-auth and login-action.
      - name: Build and push container image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.ver.outputs.label }}
            COMMIT=${{ steps.ver.outputs.sha }}
