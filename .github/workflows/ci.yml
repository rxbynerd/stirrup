name: CI

on:
  push:

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/_verify.yml

  eval-gate:
    name: Eval Gate
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: |
            harness/go.mod
            types/go.mod
            eval/go.mod

      - name: Compute version label
        id: ver
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "label=main" >> "$GITHUB_OUTPUT"
          else
            echo "label=dev" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          go build -trimpath \
            -ldflags="-X github.com/rxbynerd/stirrup/types/version.version=${{ steps.ver.outputs.label }} -X github.com/rxbynerd/stirrup/types/version.commit=${{ steps.ver.outputs.sha }}" \
            -o stirrup ./harness/cmd/stirrup
          go build -trimpath \
            -ldflags="-X github.com/rxbynerd/stirrup/types/version.version=${{ steps.ver.outputs.label }} -X github.com/rxbynerd/stirrup/types/version.commit=${{ steps.ver.outputs.sha }}" \
            -o stirrup-eval ./eval/cmd/eval

      - name: Check for eval suites
        id: check-suites
        shell: bash
        run: |
          shopt -s nullglob
          suites=(eval/suites/*.hcl)
          if [ ${#suites[@]} -gt 0 ]; then
            echo "has_suites=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_suites=false" >> "$GITHUB_OUTPUT"
            echo "No eval suites found — skipping eval gate"
          fi

      - name: Run eval suite
        if: steps.check-suites.outputs.has_suites == 'true'
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          shopt -s nullglob
          mkdir -p eval/results
          for suite in eval/suites/*.hcl; do
            name=$(basename "$suite")
            name="${name%.*}"
            # JUnit XML is an annotation/artifact only; the eval gate
            # is enforced by the `compare` step below.
            ./stirrup-eval run \
              --suite "$suite" \
              --harness ./stirrup \
              --output "eval/results/${name}" \
              --junit "eval/results/${name}/junit.xml"
          done

      - name: Compare against baseline
        if: steps.check-suites.outputs.has_suites == 'true'
        shell: bash
        run: |
          shopt -s nullglob
          for result_dir in eval/results/*/; do
            name=$(basename "$result_dir")
            result="${result_dir}result.json"
            baseline="eval/baselines/${name}.json"
            if [ -f "$baseline" ]; then
              ./stirrup-eval compare \
                --current "$result" \
                --baseline "$baseline"
            else
              echo "No baseline found at $baseline — skipping comparison"
            fi
          done

      - name: Upload eval results
        # Always upload whatever made it to disk so result.json survives
        # an unrelated failure (e.g. compare step regression exit, future
        # secondary-artifact steps). The eval-gate's pass/fail signal is
        # carried by the compare step's exit code, not artifact presence.
        if: always() && steps.check-suites.outputs.has_suites == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: eval-results
          path: eval/results/
          retention-days: 30

  publish-container:
    name: Publish Container
    runs-on: ubuntu-latest
    needs: verify
    # Belt-and-braces fork guard: the WIF provider's attribute condition
    # already pins assertion.repository == 'rxbynerd/stirrup', but adding
    # the repository check here means a future change to the trigger
    # condition (e.g. running on forked main branches) cannot accidentally
    # surface a silent WIF auth failure on someone else's fork.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'rxbynerd/stirrup'
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # Mirrors the eval-gate version-computation step. The `if:` guard
      # above currently restricts this job to refs/heads/main pushes, so
      # `label` will always be `main` today; computing it indirectly
      # keeps the build-args block honest if that condition is ever
      # relaxed (e.g. tag-triggered runs added) and prevents the
      # VERSION literal from drifting from the actual ref.
      - name: Compute version label
        id: ver
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "label=main" >> "$GITHUB_OUTPUT"
          else
            echo "label=dev" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # SHA-pinned to v3.7.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/setup-qemu-action/git/refs/tags/v3.7.0`,
      # which also matches the v3 floating tag's current target).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      # SHA-pinned to v4.0.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/setup-buildx-action/git/refs/tags/v4.0.0`,
      # which also matches the v4 floating tag's current target). Pinned
      # for the same reason as gcp-auth: this action runs inside the
      # job that holds a live GAR access token; a retargeted floating
      # tag could exfiltrate it.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # SHA-pinned to v4.1.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/login-action/git/refs/tags/v4.1.0`,
      # which also matches the v4 floating tag's current target). This
      # action receives the GHCR/GAR credentials as `password:` —
      # downstream consumer of the token gcp-auth mints; pinning to an
      # immutable commit is non-negotiable here too.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # SHA-pinned to v3.0.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/google-github-actions/auth/git/refs/tags/v3.0.0`,
      # which also matches the v3 floating tag's current target). This
      # action mints a Google access token from the GHA OIDC JWT and is
      # the trust hinge for GAR push — pinning to an immutable commit is
      # non-negotiable.
      #
      # `token_format` is intentionally omitted: Direct WIF (no
      # intermediate service account) cannot synthesize an OAuth2 access
      # token through this action's `access_token` output — that path
      # requires SA impersonation. Instead, this step writes the
      # federated `external_account` ADC credentials file, and the
      # follow-up `gcloud auth print-access-token` step mints the bearer
      # token via the STS exchange. See `docs/container-publishing.md`.
      - name: Authenticate to Google Cloud (Direct WIF)
        id: gcp-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      # SHA-pinned to v3.0.1. Same pin as
      # `smoke-gar-publish.yml::Set up gcloud CLI` — must move in
      # lockstep. SHA verified via the GitHub API on 2026-05-10
      # (`gh api repos/google-github-actions/setup-gcloud/git/refs/tags/v3.0.1`,
      # which also matches the v3 floating tag's current target). The
      # auth step only writes credentials; `gcloud` is needed on PATH so
      # the next step can mint the GAR access token.
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      # `gcloud auth print-access-token` transparently performs the STS
      # token-exchange against the federated principal and prints a
      # Google access token usable by GAR. This is the canonical
      # Direct-WIF pattern: the auth action's `access_token` output is
      # unavailable without SA impersonation, but ADC + `gcloud` can
      # still mint a bearer token from the federated credentials file.
      #
      # `::add-mask::` MUST run before the token is emitted to
      # GITHUB_OUTPUT — masking applies to all subsequent log output, so
      # any later step that accidentally echoes the token gets it
      # redacted automatically.
      - name: Mint GAR access token
        id: gar-token
        shell: bash
        run: |
          TOKEN=$(gcloud auth print-access-token)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ vars.GAR_LOCATION }}-docker.pkg.dev
          # GAR demands the literal string "oauth2accesstoken" as the
          # username when the password is a short-lived access token.
          # Substituting a service-account email here fails opaquely —
          # do not "fix" this to something more meaningful.
          username: oauth2accesstoken
          password: ${{ steps.gar-token.outputs.token }}

      # SHA-pinned to v6.0.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/metadata-action/git/refs/tags/v6.0.0`,
      # which also matches the v6 floating tag's current target). Pinned
      # for the same reason as login-action: runs inside the credentialled
      # publish job and constructs the tag list that build-push-action
      # consumes — a retargeted tag could redirect pushes.
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/rxbynerd/stirrup
            ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ vars.GAR_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-

      # SHA-pinned to v7.1.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/build-push-action/git/refs/tags/v7.1.0`,
      # which also matches the v7 floating tag's current target). This
      # action performs the actual push using the live GHCR + GAR
      # credentials; pinning to an immutable commit is non-negotiable
      # here for the same reason as gcp-auth and login-action.
      - name: Build and push container image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.ver.outputs.label }}
            COMMIT=${{ steps.ver.outputs.sha }}
