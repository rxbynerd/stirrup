name: CI

on:
  push:

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/_verify.yml

  eval-gate:
    name: Eval Gate
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: |
            harness/go.mod
            types/go.mod
            eval/go.mod

      - name: Compute version label
        id: ver
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "label=main" >> "$GITHUB_OUTPUT"
          else
            echo "label=dev" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          go build -trimpath \
            -ldflags="-X github.com/rxbynerd/stirrup/types/version.version=${{ steps.ver.outputs.label }} -X github.com/rxbynerd/stirrup/types/version.commit=${{ steps.ver.outputs.sha }}" \
            -o stirrup ./harness/cmd/stirrup
          go build -trimpath \
            -ldflags="-X github.com/rxbynerd/stirrup/types/version.version=${{ steps.ver.outputs.label }} -X github.com/rxbynerd/stirrup/types/version.commit=${{ steps.ver.outputs.sha }}" \
            -o stirrup-eval ./eval/cmd/eval

      - name: Check for eval suites
        id: check-suites
        shell: bash
        run: |
          shopt -s nullglob
          suites=(eval/suites/*.hcl)
          if [ ${#suites[@]} -gt 0 ]; then
            echo "has_suites=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_suites=false" >> "$GITHUB_OUTPUT"
            echo "No eval suites found — skipping eval gate"
          fi

      - name: Run eval suite
        if: steps.check-suites.outputs.has_suites == 'true'
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          shopt -s nullglob
          mkdir -p eval/results
          for suite in eval/suites/*.hcl; do
            name=$(basename "$suite")
            name="${name%.*}"
            # JUnit XML is an annotation/artifact only; the eval gate
            # is enforced by the `compare` step below.
            ./stirrup-eval run \
              --suite "$suite" \
              --harness ./stirrup \
              --output "eval/results/${name}" \
              --junit "eval/results/${name}/junit.xml"
          done

      - name: Compare against baseline
        if: steps.check-suites.outputs.has_suites == 'true'
        shell: bash
        run: |
          shopt -s nullglob
          for result_dir in eval/results/*/; do
            name=$(basename "$result_dir")
            result="${result_dir}result.json"
            baseline="eval/baselines/${name}.json"
            if [ -f "$baseline" ]; then
              ./stirrup-eval compare \
                --current "$result" \
                --baseline "$baseline"
            else
              echo "No baseline found at $baseline — skipping comparison"
            fi
          done

      - name: Upload eval results
        # Always upload whatever made it to disk so result.json survives
        # an unrelated failure (e.g. compare step regression exit, future
        # secondary-artifact steps). The eval-gate's pass/fail signal is
        # carried by the compare step's exit code, not artifact presence.
        if: always() && steps.check-suites.outputs.has_suites == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: eval-results
          path: eval/results/
          retention-days: 30

  publish-container:
    name: Publish Container
    runs-on: ubuntu-latest
    needs: verify
    # Belt-and-braces fork guard mirroring the publish jobs elsewhere.
    # ci.yml's publish-container is GHCR-only; the GAR dual-publish
    # path lives in release.yml::publish-container. Dev images
    # (:latest, :main, :sha-<7>) are deliberately kept out of GAR
    # because containerscanning.googleapis.com (enabled project-wide
    # per docs/container-publishing.md) auto-scans on every GAR push
    # and bills per scan — sending one scan per main commit is the
    # line item that made the GCP bill exceed token spend. Releases
    # still dual-publish, and free continuous CVE re-evaluation
    # against loaded SBOMs continues for everything already in GAR.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'rxbynerd/stirrup'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # Mirrors the eval-gate version-computation step. The `if:` guard
      # above currently restricts this job to refs/heads/main pushes, so
      # `label` will always be `main` today; computing it indirectly
      # keeps the build-args block honest if that condition is ever
      # relaxed (e.g. tag-triggered runs added) and prevents the
      # VERSION literal from drifting from the actual ref.
      - name: Compute version label
        id: ver
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "label=main" >> "$GITHUB_OUTPUT"
          else
            echo "label=dev" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # SHA-pinned to v3.7.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/setup-qemu-action/git/refs/tags/v3.7.0`,
      # which also matches the v3 floating tag's current target).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      # SHA-pinned to v4.0.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/setup-buildx-action/git/refs/tags/v4.0.0`,
      # which also matches the v4 floating tag's current target). Pinned
      # for the same reason as login-action: runs inside the
      # credentialled push job and a retargeted floating tag could
      # exfiltrate the GHCR token in env.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # SHA-pinned to v4.1.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/login-action/git/refs/tags/v4.1.0`,
      # which also matches the v4 floating tag's current target). This
      # action receives the GHCR credentials as `password:`; pinning
      # to an immutable commit is non-negotiable here.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # SHA-pinned to v6.0.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/metadata-action/git/refs/tags/v6.0.0`,
      # which also matches the v6 floating tag's current target). Pinned
      # for the same reason as login-action: runs inside the credentialled
      # publish job and constructs the tag list that build-push-action
      # consumes — a retargeted tag could redirect pushes.
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/rxbynerd/stirrup
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-

      # SHA-pinned to v7.1.0. SHA verified via the GitHub API on
      # 2026-05-10 (`gh api repos/docker/build-push-action/git/refs/tags/v7.1.0`,
      # which also matches the v7 floating tag's current target). This
      # action performs the actual push using the live GHCR + GAR
      # credentials; pinning to an immutable commit is non-negotiable
      # here for the same reason as gcp-auth and login-action.
      - name: Build and push container image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.ver.outputs.label }}
            COMMIT=${{ steps.ver.outputs.sha }}
