name: Verify (reusable)

# Reusable verify job invoked by ci.yml on every push and by release.yml
# at the start of every tagged release. Centralising it keeps the gate
# identical between routine CI and release builds — if the tagged SHA
# can't pass this, it can't be released.

on:
  workflow_call:
    inputs:
      ref:
        description: >-
          Git ref to check out and test. Defaults to github.sha, which is
          correct for ci.yml's per-push invocation. release.yml passes the
          resolved release tag here so a workflow_dispatch retrigger tests the
          tagged commit rather than whatever main currently points at.
        type: string
        required: false
        default: ''

jobs:
  verify:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # Empty inputs.ref falls through to actions/checkout's default
          # (github.sha), preserving behaviour for ci.yml callers that
          # don't pass the input.
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: |
            harness/go.mod
            types/go.mod
            eval/go.mod

      - name: Compute version label
        id: ver
        env:
          # Prefer the resolved input ref when set so a tag-push or a
          # workflow_dispatch-triggered tag run produces a label of the
          # tag name rather than "dev". Fall back to GITHUB_REF for the
          # default ci.yml invocation.
          REF: ${{ inputs.ref != '' && format('refs/tags/{0}', inputs.ref) || github.ref }}
        run: |
          if [ "$REF" = "refs/heads/main" ]; then
            label="main"
          elif [[ "$REF" == refs/tags/* ]]; then
            label="${REF#refs/tags/}"
          else
            label="dev"
          fi
          echo "label=$label" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Run type module tests
        working-directory: types
        run: go test ./...

      - name: Run harness module tests
        working-directory: harness
        run: go test ./...

      - name: Run eval module tests
        working-directory: eval
        run: go test ./...

      - name: Build stirrup binary
        working-directory: harness
        env:
          VERSION_LABEL: ${{ steps.ver.outputs.label }}
          COMMIT_SHA: ${{ steps.ver.outputs.sha }}
        run: |
          go build -trimpath \
            -ldflags="-X github.com/rxbynerd/stirrup/types/version.version=${VERSION_LABEL} -X github.com/rxbynerd/stirrup/types/version.commit=${COMMIT_SHA}" \
            ./cmd/stirrup

      - name: Build eval binary
        env:
          VERSION_LABEL: ${{ steps.ver.outputs.label }}
          COMMIT_SHA: ${{ steps.ver.outputs.sha }}
        run: |
          go build -trimpath \
            -ldflags="-X github.com/rxbynerd/stirrup/types/version.version=${VERSION_LABEL} -X github.com/rxbynerd/stirrup/types/version.commit=${COMMIT_SHA}" \
            -o stirrup-eval ./eval/cmd/eval
