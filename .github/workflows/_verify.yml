name: Verify (reusable)

# Reusable verify job invoked by ci.yml on every push and by release.yml
# at the start of every tagged release. Centralising it keeps the gate
# identical between routine CI and release builds — if the tagged SHA
# can't pass this, it can't be released.

on:
  workflow_call:

jobs:
  verify:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: |
            harness/go.mod
            types/go.mod
            eval/go.mod

      - name: Compute version label
        id: ver
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "label=main" >> "$GITHUB_OUTPUT"
          else
            echo "label=dev" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Run type module tests
        working-directory: types
        run: go test ./...

      - name: Run harness module tests
        working-directory: harness
        run: go test ./...

      - name: Run eval module tests
        working-directory: eval
        run: go test ./...

      - name: Build stirrup binary
        working-directory: harness
        run: >
          go build -trimpath
          -ldflags="-X github.com/rxbynerd/stirrup/types/version.version=${{ steps.ver.outputs.label }}
            -X github.com/rxbynerd/stirrup/types/version.commit=${{ steps.ver.outputs.sha }}"
          ./cmd/stirrup

      - name: Build eval binary
        run: >
          go build -trimpath
          -ldflags="-X github.com/rxbynerd/stirrup/types/version.version=${{ steps.ver.outputs.label }}
            -X github.com/rxbynerd/stirrup/types/version.commit=${{ steps.ver.outputs.sha }}"
          -o stirrup-eval ./eval/cmd/eval
