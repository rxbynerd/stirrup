name: Smoke Test - Azure OpenAI WIF

# End-to-end smoke test for Azure OpenAI Entra ID Workload Identity
# Federation. Manually dispatched. Exchanges the GitHub Actions OIDC
# token for a Microsoft Entra access token via the federated identity
# credential below, then runs the harness against a live Azure OpenAI
# deployment with no static API key in scope. Tenant ID and client ID
# are non-secret per Microsoft's WIF docs and live committed in the
# referenced --config fixture.
#
# Refs #160 / #118 / #132

on:
  workflow_dispatch:

jobs:
  smoke-azure-openai-wif:
    name: Azure OpenAI WIF Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: |
            harness/go.mod
            types/go.mod
            eval/go.mod

      - name: Build stirrup binary
        working-directory: harness
        run: go build -o ../stirrup ./cmd/stirrup

      - name: Create workspace
        run: mkdir -p workspace

      - name: Run smoke test
        run: |
          ./stirrup harness \
            --config examples/runconfig/azure-openai-wif-smoke.json \
            --workspace workspace \
            --trace trace.jsonl \
            --max-turns 5 \
            --prompt "Write the string 'smoke test passed' to a file called hello.txt"

      - name: Verify trace outcome
        shell: bash
        run: |
          set -euo pipefail
          [ -s trace.jsonl ] || { echo "trace.jsonl is missing or empty" >&2; exit 1; }
          jq -e '.outcome == "success"' trace.jsonl

      - name: Verify workspace output
        run: |
          test -f workspace/hello.txt || { echo "hello.txt was not created" >&2; exit 1; }
          grep -qF 'smoke test passed' workspace/hello.txt || { echo "hello.txt does not contain expected string" >&2; cat workspace/hello.txt >&2; exit 1; }

      - name: Upload trace
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-trace-azure-openai-wif
          path: trace.jsonl
          retention-days: 7
